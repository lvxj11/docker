name: Automatic ERPNext v15 Image Build and Push

on:
  # 保留手动执行能力
  workflow_dispatch:
  # 监听来自检测工作流的事件
  repository_dispatch:
    types: [build_erpnext_v15]  # 事件类型，对应检测工作流中的配置

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Log in to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_TOKEN }}

    - name: Get version and prepare build args
      id: get_version
      run: |
        # 生成 APPS_JSON_BASE64
        APPS_JSON_BASE64=$(base64 -w 0 ./erpnext15/aiofile/apps.json)
        echo "APPS_JSON_BASE64=$APPS_JSON_BASE64" >> $GITHUB_OUTPUT
        
        # 如果是repository_dispatch事件触发，使用事件payload中的版本号
        if [ "${{ github.event_name }}" == "repository_dispatch" ]; then
          VERSION="${{ github.event.client_payload.version }}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "IS_V15=true" >> $GITHUB_OUTPUT
        else
          # 手动触发时，获取最新的v15版本
          LATEST_V15_RELEASE=$(curl -s https://api.github.com/repos/frappe/erpnext/releases | jq -r '.[] | select(.tag_name | test("^v?15\\.")) | .tag_name' | sort -V -r | head -1)
          
          # 检查是否获取到了版本号
          if [ -z "$LATEST_V15_RELEASE" ]; then
            echo "VERSION=unknown" >> $GITHUB_OUTPUT
            echo "IS_V15=false" >> $GITHUB_OUTPUT
          else
            echo "VERSION=$LATEST_V15_RELEASE" >> $GITHUB_OUTPUT
            echo "IS_V15=true" >> $GITHUB_OUTPUT
            echo "获取到的最新v15版本: $LATEST_V15_RELEASE"
          fi
        fi

    - name: Build and push to Docker Hub
      if: steps.get_version.outputs.IS_V15 == 'true'
      uses: docker/build-push-action@v7
      with:
        context: ./erpnext15
        file: ./erpnext15/Containerfile-aio
        push: true
        tags: |
          lvxj11/erpnext:${{ steps.get_version.outputs.VERSION }}
          lvxj11/erpnext:v15
        build-args: |
          APPS_JSON_BASE64=${{ steps.get_version.outputs.APPS_JSON_BASE64 }}
        target: erpnext_aio