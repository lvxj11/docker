name: Automatic ERPNext v15 Image Build and Push

on:
  # 保留手动执行能力
  workflow_dispatch:
  # 当目标库发布新的Releases时激活
  release:
    types: [published]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_TOKEN }}

    - name: Get latest release version
      id: get_version
      run: |
        # 如果是Release触发，使用Release的tag名称
        if [ "${{ github.event_name }}" == "release" ]; then
          echo "VERSION=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
        else
          # 手动触发时，自动检测最新的发布版本号
          # 这里假设目标库是 frappe/erpnext，你可以根据实际情况修改
          LATEST_RELEASE=$(curl -s https://api.github.com/repos/frappe/erpnext/releases/latest | jq -r '.tag_name')
          echo "VERSION=$LATEST_RELEASE" >> $GITHUB_OUTPUT
        fi

    - name: Build and push to Docker Hub
      working-directory: ./erpnext15
      run: |
        # 1. 生成变量
        APPS_JSON_BASE64=$(base64 -w 0 ./aiofile/apps.json)
        
        # 2. 获取版本号
        NEW_TAG="${{ steps.get_version.outputs.VERSION }}"
        
        # 3. 定义镜像名称
        IMAGE_NAME="lvxj11/erpnext:${NEW_TAG}"
        
        # 4. 构建
        docker build . \
          --file Containerfile-aio \
          --build-arg APPS_JSON_BASE64=$APPS_JSON_BASE64 \
          --tag $IMAGE_NAME \
          --tag lvxj11/erpnext:v15 \
          --target erpnext_aio \
          --progress plain
        
        # 5. 推送到 Docker Hub
        echo "推送中..."
        docker push $IMAGE_NAME
        docker push lvxj11/erpnext:v15