name: Automatic ERPNext v16 Image Build and Push

on:
  # 保留手动执行能力
  workflow_dispatch:
  # 监听来自检测工作流的事件
  repository_dispatch:
    types: [build_erpnext_v16]  # 事件类型，对应检测工作流中的配置

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_TOKEN }}

    - name: Get version
      id: get_version
      run: |
        # 如果是repository_dispatch事件触发，使用事件payload中的版本号
        if [ "${{ github.event_name }}" == "repository_dispatch" ]; then
          VERSION="${{ github.event.client_payload.version }}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "IS_V16=true" >> $GITHUB_OUTPUT
          echo "获取到的版本号（来自事件）: $VERSION"
        else
          # 手动触发时，获取最新的v16版本
          LATEST_V16_RELEASE=$(curl -s https://api.github.com/repos/frappe/erpnext/releases | jq -r '.[] | select(.tag_name | test("^v?16\\.")) | .tag_name' | sort -V -r | head -1)
          
          # 检查是否获取到了版本号
          if [ -z "$LATEST_V16_RELEASE" ]; then
            echo "VERSION=unknown" >> $GITHUB_OUTPUT
            echo "IS_V16=false" >> $GITHUB_OUTPUT
          else
            echo "VERSION=$LATEST_V16_RELEASE" >> $GITHUB_OUTPUT
            echo "IS_V16=true" >> $GITHUB_OUTPUT
            echo "获取到的最新v16版本: $LATEST_V16_RELEASE"
          fi
        fi

    - name: Build and push to Docker Hub
      if: steps.get_version.outputs.IS_V16 == 'true'
      working-directory: ./erpnext16
      run: |
        # 1. 生成变量
        APPS_JSON_BASE64=$(base64 -w 0 ./aiofile/apps.json)
        
        # 2. 获取版本号
        NEW_TAG="${{ steps.get_version.outputs.VERSION }}"
        
        # 3. 定义镜像名称
        IMAGE_NAME="lvxj11/erpnext:${NEW_TAG}"
        
        # 4. 构建
        docker build . \
          --file Containerfile-aio \
          --build-arg APPS_JSON_BASE64=$APPS_JSON_BASE64 \
          --tag $IMAGE_NAME \
          --tag lvxj11/erpnext:v16 \
          --target erpnext_aio \
          --progress plain
        
        # 5. 推送到 Docker Hub
        echo "推送中..."
        docker push $IMAGE_NAME
        docker push lvxj11/erpnext:v16