name: Automatic ERPNext v16 Image Build and Push

on:
  # 保留手动执行能力
  workflow_dispatch:
  # 定期检查官方仓库的新版本（每天执行一次）
  schedule:
    - cron: '0 0 * * *'  # 每天 UTC 时间 00:00 执行

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_TOKEN }}

    - name: Get latest v16 release version
      id: get_version
      run: |
        # 无论是手动触发还是定时触发，都从官方仓库获取最新的v16发布版本号
        # 这里目标库是 frappe/erpnext
        # 获取所有发布版本，过滤出v16版本，按版本号排序，取最新的
        LATEST_V16_RELEASE=$(curl -s https://api.github.com/repos/frappe/erpnext/releases | jq -r '.[] | select(.tag_name | test("^v?16\\.")) | .tag_name' | sort -V -r | head -1)
        
        # 检查是否获取到了版本号
        if [ -z "$LATEST_V16_RELEASE" ]; then
          echo "VERSION=unknown" >> $GITHUB_OUTPUT
          echo "IS_V16=false" >> $GITHUB_OUTPUT
        else
          echo "VERSION=$LATEST_V16_RELEASE" >> $GITHUB_OUTPUT
          echo "IS_V16=true" >> $GITHUB_OUTPUT
        fi
        
        # 输出获取到的版本号，便于调试
        echo "获取到的最新v16版本: $LATEST_V16_RELEASE"

    - name: Build and push to Docker Hub
      if: steps.get_version.outputs.IS_V16 == 'true'
      working-directory: ./erpnext16
      run: |
        # 1. 生成变量
        APPS_JSON_BASE64=$(base64 -w 0 ./aiofile/apps.json)
        
        # 2. 获取版本号
        NEW_TAG="${{ steps.get_version.outputs.VERSION }}"
        
        # 3. 定义镜像名称
        IMAGE_NAME="lvxj11/erpnext:${NEW_TAG}"
        
        # 4. 构建
        docker build . \
          --file Containerfile-aio \
          --build-arg APPS_JSON_BASE64=$APPS_JSON_BASE64 \
          --tag $IMAGE_NAME \
          --tag lvxj11/erpnext:v16 \
          --target erpnext_aio \
          --progress plain
        
        # 5. 推送到 Docker Hub
        echo "推送中..."
        docker push $IMAGE_NAME
        docker push lvxj11/erpnext:v16